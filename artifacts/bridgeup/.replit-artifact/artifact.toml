kind = "web"
previewPath = "/"
title = "BridgeUp"
version = "1.0.0"
id = "artifacts/bridgeup"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/bridgeup run dev"

[services.production]
run = "pnpm --filter @workspace/bridgeup run start"

[services.env]
PORT = "3000"
NODE_ENV = "development"
