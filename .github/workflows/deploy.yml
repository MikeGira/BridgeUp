name: Security Scan + Build + Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. Secret scanning — blocks deploy if secrets are found ─────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── 2. Static security analysis ─────────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  # ─── 3. Dependency audit ──────────────────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run npm audit (block on critical only)
        run: |
          npm audit --json > /tmp/audit.json 2>/dev/null || true
          npm audit || true
          CRITICAL=$(python3 -c "
          import json; d=json.load(open('/tmp/audit.json'))
          print(d.get('metadata',{}).get('vulnerabilities',{}).get('critical',0))
          " 2>/dev/null || echo 0)
          echo "Critical vulnerabilities: $CRITICAL"
          [ "$CRITICAL" -gt "0" ] && { echo "BLOCKING: critical vulnerabilities found"; exit 1; } || echo "No critical vulnerabilities."

      - name: Check for outdated packages
        run: npm outdated || true

  # ─── 4. Build + TypeScript check ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: TypeScript typecheck
        run: npx tsc --noEmit || true

      - name: Build frontend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  # ─── 5. Custom security checks ────────────────────────────────────────────────
  security-check:
    name: Custom Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          FOUND=0
          # Check for patterns that look like secrets in source files
          if grep -rn --include="*.js" --include="*.ts" --include="*.tsx" \
             -E "(password\s*[:=]\s*['\"][^'\"]{6,}|api_key\s*[:=]\s*['\"][^'\"]{10,}|secret\s*[:=]\s*['\"][^'\"]{10,})" \
             --exclude-dir=node_modules --exclude-dir=.git . 2>/dev/null; then
            echo "WARNING: Possible hardcoded secrets found — review above"
            FOUND=1
          fi
          if [ $FOUND -eq 0 ]; then echo "No hardcoded secrets detected."; fi

      - name: Verify .env not tracked
        run: |
          # Match .env and .env.* but explicitly exclude .env.example (safe to commit)
          if git ls-files | grep -E "^\.env$|^\.env\.(local|production|staging|development)$|^artifacts/.*\.env$"; then
            echo "ERROR: .env file is tracked by git!"
            exit 1
          fi
          echo ".env files correctly excluded from git."

      - name: Verify security headers configured
        run: |
          grep -rq "X-Content-Type-Options\|nosniff" vercel.json api/_lib/cors.js && echo "Security headers: configured" || echo "WARNING: security headers may be missing"

      - name: Verify JWT auth is used in API routes
        run: |
          grep -rq "requireAuth" api/auth/me.js api/needs/index.js api/matching/matches.js && echo "JWT auth: configured" || echo "WARNING: auth may be missing in some routes"

      - name: Scan for potential injection patterns
        run: |
          grep -rn --include="*.js" "eval(\|new Function(" --exclude-dir=node_modules . 2>/dev/null && echo "WARNING: eval/new Function found — review" || echo "No eval/new Function patterns detected."

  # ─── 6. Deploy to Vercel (main branch only) ───────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [secret-scan, build, security-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI (latest)
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Smoke test — ping endpoint
        run: |
          SITE_URL="${{ secrets.SITE_URL }}"
          echo "Testing $SITE_URL/api/ping"
          sleep 15
          RESPONSE=$(curl -sf "$SITE_URL/api/ping" 2>&1 || echo "FAILED")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"ok":true' && echo "Ping test PASSED" || echo "WARNING: ping test returned unexpected response"

      - name: Smoke test — health endpoint
        run: |
          SITE_URL="${{ secrets.SITE_URL }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL/api/health")
          echo "Health endpoint returned HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Health test PASSED"
          else
            echo "WARNING: /api/health returned $STATUS — check function logs in Vercel dashboard"
          fi

      - name: Smoke test — security headers
        run: |
          SITE_URL="${{ secrets.SITE_URL }}"
          HEADERS=$(curl -sI "$SITE_URL/" 2>&1)
          echo "$HEADERS" | grep -i "X-Content-Type-Options" && echo "X-Content-Type-Options: present" || echo "WARNING: X-Content-Type-Options missing"
          echo "$HEADERS" | grep -i "Strict-Transport-Security"  && echo "HSTS: present"                || echo "WARNING: HSTS missing"
