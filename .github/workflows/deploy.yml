name: Security Scan + Build + Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. Secret scanning — blocks deploy if secrets are found ─────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── 2. Static security analysis ─────────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  # ─── 3. Dependency audit ──────────────────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: artifacts/bridgeup/package.json

      - name: Install dependencies
        working-directory: artifacts/bridgeup
        run: npm install

      - name: Run npm audit (critical only)
        working-directory: artifacts/bridgeup
        # Auditing at critical level: xlsx has known high-severity vulns with no upstream fix available.
        # Tracked in project issues. Upgrade or replace xlsx when a patched version ships.
        run: npm audit --audit-level=critical
        continue-on-error: false

      - name: Check for outdated packages
        working-directory: artifacts/bridgeup
        run: npm outdated || true

  # ─── 4. Build + TypeScript check ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: artifacts/bridgeup/package.json

      - name: Install dependencies
        working-directory: artifacts/bridgeup
        run: npm install

      - name: TypeScript typecheck
        working-directory: artifacts/bridgeup
        run: npx tsc --noEmit || true

      - name: Build frontend
        working-directory: artifacts/bridgeup
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: artifacts/bridgeup/dist/public
          retention-days: 1

  # ─── 5. Custom security checks ────────────────────────────────────────────────
  security-check:
    name: Custom Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          FOUND=0
          # Check for patterns that look like secrets in source files
          if grep -rn --include="*.js" --include="*.ts" --include="*.tsx" \
             -E "(password\s*[:=]\s*['\"][^'\"]{6,}|api_key\s*[:=]\s*['\"][^'\"]{10,}|secret\s*[:=]\s*['\"][^'\"]{10,})" \
             --exclude-dir=node_modules --exclude-dir=.git . 2>/dev/null; then
            echo "WARNING: Possible hardcoded secrets found — review above"
            FOUND=1
          fi
          if [ $FOUND -eq 0 ]; then echo "No hardcoded secrets detected."; fi

      - name: Verify .env not tracked
        run: |
          # Match .env and .env.* but explicitly exclude .env.example (safe to commit)
          if git ls-files | grep -E "^\.env$|^\.env\.(local|production|staging|development)$|^artifacts/.*\.env$"; then
            echo "ERROR: .env file is tracked by git!"
            exit 1
          fi
          echo ".env files correctly excluded from git."

      - name: Verify security headers in server
        run: |
          if grep -q "helmet" artifacts/bridgeup/server/index.js; then
            echo "Helmet security headers: configured"
          else
            echo "WARNING: Helmet not found in server/index.js"
            exit 1
          fi

      - name: Check rate limiting
        run: |
          if grep -q "rateLimit\|rate-limit" artifacts/bridgeup/server/index.js; then
            echo "Rate limiting: configured"
          else
            echo "WARNING: Rate limiting not found"
            exit 1
          fi

      - name: Scan for SQL injection patterns
        run: |
          if grep -rn --include="*.js" "query.*\+.*req\.\|execute.*req\." \
             --exclude-dir=node_modules artifacts/bridgeup/server 2>/dev/null; then
            echo "WARNING: Possible SQL injection patterns found — review"
          else
            echo "No obvious SQL injection patterns detected."
          fi

  # ─── 6. Deploy to Vercel (main branch only) ───────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [secret-scan, build, security-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args:       '--prod'
          working-directory: .

      - name: Wait for deployment
        run: sleep 20

      - name: Smoke test — health endpoint
        run: |
          SITE_URL="${{ secrets.SITE_URL || steps.deploy.outputs.preview-url }}"
          echo "Testing $SITE_URL/api/health"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL/api/health")
          if [ "$STATUS" != "200" ]; then
            echo "SMOKE TEST FAILED: /api/health returned $STATUS"
            exit 1
          fi
          echo "Smoke test passed (status $STATUS)"

      - name: Smoke test — security headers
        run: |
          SITE_URL="${{ secrets.SITE_URL || steps.deploy.outputs.preview-url }}"
          HEADERS=$(curl -sI "$SITE_URL/api/health")
          echo "$HEADERS"
          # Verify key security headers are present
          echo "$HEADERS" | grep -i "X-Content-Type-Options" || echo "WARNING: X-Content-Type-Options missing"
          echo "$HEADERS" | grep -i "Strict-Transport-Security" || echo "WARNING: HSTS missing"

      - name: Notify on failure
        if: failure()
        run: |
          echo "DEPLOYMENT FAILED — check the logs above for details."
          echo "The following checks must pass before deployment: secret-scan, build, security-check"
