<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />

    <!-- PWA / theme -->
    <meta name="theme-color" content="#2563EB" />
    <meta name="description" content="BridgeUp — Connect people in need with verified helpers instantly, safely, anywhere in the world." />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="BridgeUp" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />

    <!-- Open Graph (for sharing link previews) -->
    <meta property="og:title" content="BridgeUp" />
    <meta property="og:description" content="Connect people in need with verified helpers instantly, safely, anywhere." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon.svg" />
    <meta name="twitter:card" content="summary" />

    <title>BridgeUp — Human Needs OS</title>

    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="shortcut icon" href="/icons/icon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Leaflet (loaded from CDN for map) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; overflow: hidden; }
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        overscroll-behavior: none;
        -webkit-font-smoothing: antialiased;
      }
      #root { height: 100dvh; width: 100%; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
